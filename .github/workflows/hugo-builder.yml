name: Hugo Builder

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "import/**"
      - ".github/**"

  workflow_dispatch:

  repository_dispatch:
    types: [hugo-build]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          submodules: true

      - name: Install npm dependencies if present
        run: |
          if find . -name "package.json" -not -path "*/node_modules/*" -not -path "*/public/*" | grep -q .; then
            echo "Installing npm dependencies..."
            find . -name "package.json" -not -path "*/node_modules/*" -not -path "*/public/*" -exec sh -c 'cd "$(dirname "$1")" && npm install' _ {} \;
          else
            echo "No package.json files found, skipping npm install"
          fi

      - name: Read Hugo version
        id: hugo-version
        run: echo "HUGO_VERSION=$(cat .hugoversion)" >> "$GITHUB_OUTPUT"

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ steps.hugo-version.outputs.HUGO_VERSION }}
          extended: true

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
        run: |
          start_time=$(date +%s)

          hugo \
            --minify \
            --gc \
            --enableGitInfo \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

          end_time=$(date +%s)
          build_time=$((end_time - start_time))
          echo "::notice::Build time: $build_time seconds"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
